<!--HTML SEMÂNTICO: O HTML semântico é uma forma de escrever código HTML que utiliza tags que descrevem 
claramente o conteúdo e a estrutura da página. Ele ajuda os motores de busca a entenderem melhor o conteúdo da página,
além de melhorar a acessibilidade para pessoas com deficiências.

 As principais tags semânticas são: 
     <header>   <!-Define o cabeçario da página, geralmente contém o título e a navegação principal
     <nav>      <!-Define a seção de navegação da página,geralmente contém links para outras páginas ou seções da mesma página
     <main>     <!-Define o conteúdo principal da página, geralmente contém o conteúdo mais importante da página
     <article>  <!-Define um artigo independente na página, geralmente contém conteúdo que poderia ser distribuído de forma independente
     <section>  <!-Define uma seção da página, geralmente contém um grupo de conteúdo relacionado
     <aside>    <!-Define um conteúdo relacionado, mas não essencial para o conteúdo principal da página, geralmente contém informações adicionais ou anúncios
     <footer>.  <!-Define o rodapé da página, geralmente contém informações de contato, direitos autorais e links para redes sociais
    


-->
